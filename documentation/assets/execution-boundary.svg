<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Execution Boundary Diagram</title>
  <desc id="desc">Diagram showing the split between LangGraph approval flow and direct backend execution after approval.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6f8fb" />
      <stop offset="100%" stop-color="#e8eef6" />
    </linearGradient>
    <linearGradient id="leftPanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f4c5c" />
      <stop offset="100%" stop-color="#1d6f82" />
    </linearGradient>
    <linearGradient id="rightPanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#274c77" />
      <stop offset="100%" stop-color="#4b6fa3" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324d" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#314a63"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #12304a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4d657d; }
      .panelTitle { font: 700 26px Arial, sans-serif; fill: #ffffff; }
      .boxTitle { font: 700 18px Arial, sans-serif; fill: #18344f; }
      .boxText { font: 400 15px Arial, sans-serif; fill: #496279; }
      .dividerText { font: 700 18px Arial, sans-serif; fill: #6f4c1f; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="80" y="88" class="title">Execution Boundary</text>
  <text x="80" y="122" class="subtitle">LangGraph owns planning and approval. Post-approval work runs directly in the backend to reduce serialization failures.</text>

  <rect x="70" y="170" width="500" height="460" rx="28" fill="url(#leftPanel)" filter="url(#shadow)"/>
  <rect x="710" y="170" width="500" height="460" rx="28" fill="url(#rightPanel)" filter="url(#shadow)"/>

  <text x="110" y="225" class="panelTitle">LangGraph-Owned Phase</text>
  <text x="750" y="225" class="panelTitle">Direct Backend Phase</text>

  <rect x="110" y="265" width="420" height="88" rx="18" fill="#ffffff"/>
  <text x="140" y="300" class="boxTitle">1. Dataset validation and preprocessing</text>
  <text x="140" y="327" class="boxText">Clean data, build manifest, cache processed files.</text>

  <rect x="110" y="373" width="420" height="88" rx="18" fill="#ffffff"/>
  <text x="140" y="408" class="boxTitle">2. Plan generation</text>
  <text x="140" y="435" class="boxText">Create a concrete checklist from the actual dataset schema.</text>

  <rect x="110" y="481" width="420" height="88" rx="18" fill="#ffffff"/>
  <text x="140" y="516" class="boxTitle">3. Approval pause</text>
  <text x="140" y="543" class="boxText">Checkpoint by thread id and wait for human review.</text>

  <rect x="750" y="265" width="420" height="88" rx="18" fill="#ffffff"/>
  <text x="780" y="300" class="boxTitle">4. Analysis execution</text>
  <text x="780" y="327" class="boxText">Run generated analysis code and normalize result types.</text>

  <rect x="750" y="373" width="420" height="88" rx="18" fill="#ffffff"/>
  <text x="780" y="408" class="boxTitle">5. Forecast and chart generation</text>
  <text x="780" y="435" class="boxText">Produce structured forecasts and chart-ready configs.</text>

  <rect x="750" y="481" width="420" height="88" rx="18" fill="#ffffff"/>
  <text x="780" y="516" class="boxTitle">6. Summary and session persistence</text>
  <text x="780" y="543" class="boxText">Write report artifacts and store follow-up context.</text>

  <line x1="570" y1="245" x2="710" y2="245" stroke="#314a63" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="417" x2="710" y2="417" stroke="#314a63" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="525" x2="710" y2="525" stroke="#314a63" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="562" y="287" width="156" height="168" rx="18" fill="#fff0d8" stroke="#e1b56f" stroke-width="2"/>
  <text x="590" y="336" class="dividerText">Boundary</text>
  <text x="588" y="368" class="boxText">Keep resume</text>
  <text x="581" y="392" class="boxText">state narrow</text>
  <text x="582" y="416" class="boxText">and approval-</text>
  <text x="603" y="440" class="boxText">safe</text>
</svg>
