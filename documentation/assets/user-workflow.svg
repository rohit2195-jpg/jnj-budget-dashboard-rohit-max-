<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Budget Dashboard User Workflow</title>
  <desc id="desc">A step-by-step visual showing upload, question, plan approval, dashboard results, and follow-up analysis.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdfd"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .step { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 18; }
      .num { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .head { font: 700 18px Arial, sans-serif; fill: #111827; }
      .copy { font: 400 14px Arial, sans-serif; fill: #4b5563; }
      .badge { fill: #d51130; }
      .line { stroke: #d51130; stroke-width: 3; fill: none; stroke-linecap: round; }
    </style>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#d51130"/>
    </marker>
  </defs>

  <rect width="1200" height="420" fill="url(#bg2)"/>
  <text x="60" y="64" class="title">End-to-End User Workflow</text>

  <g transform="translate(60 130)">
    <rect width="190" height="170" class="step"/>
    <circle cx="34" cy="34" r="20" class="badge"/>
    <text x="28" y="41" class="num">1</text>
    <text x="30" y="80" class="head">Load Data</text>
    <text x="30" y="108" class="copy">Choose an existing</text>
    <text x="30" y="130" class="copy">dataset or upload a</text>
    <text x="30" y="152" class="copy">file/folder of CSV/JSON.</text>
  </g>

  <g transform="translate(290 130)">
    <rect width="190" height="170" class="step"/>
    <circle cx="34" cy="34" r="20" class="badge"/>
    <text x="28" y="41" class="num">2</text>
    <text x="30" y="80" class="head">Ask a Question</text>
    <text x="30" y="108" class="copy">Use a broad prompt</text>
    <text x="30" y="130" class="copy">or a focused analysis</text>
    <text x="30" y="152" class="copy">request.</text>
  </g>

  <g transform="translate(520 130)">
    <rect width="190" height="170" class="step"/>
    <circle cx="34" cy="34" r="20" class="badge"/>
    <text x="28" y="41" class="num">3</text>
    <text x="30" y="80" class="head">Review Plan</text>
    <text x="30" y="108" class="copy">Inspect the generated</text>
    <text x="30" y="130" class="copy">analysis checklist and</text>
    <text x="30" y="152" class="copy">approve it.</text>
  </g>

  <g transform="translate(750 130)">
    <rect width="190" height="170" class="step"/>
    <circle cx="34" cy="34" r="20" class="badge"/>
    <text x="28" y="41" class="num">4</text>
    <text x="30" y="80" class="head">Inspect Results</text>
    <text x="30" y="108" class="copy">See charts, forecasts,</text>
    <text x="30" y="130" class="copy">and the generated</text>
    <text x="30" y="152" class="copy">markdown report.</text>
  </g>

  <g transform="translate(980 130)">
    <rect width="160" height="170" class="step"/>
    <circle cx="34" cy="34" r="20" class="badge"/>
    <text x="28" y="41" class="num">5</text>
    <text x="30" y="80" class="head">Follow Up</text>
    <text x="30" y="108" class="copy">Ask targeted questions</text>
    <text x="30" y="130" class="copy">on the same session</text>
    <text x="30" y="152" class="copy">and extend the dashboard.</text>
  </g>

  <path d="M250 215 H290" class="line" marker-end="url(#arrow2)"/>
  <path d="M480 215 H520" class="line" marker-end="url(#arrow2)"/>
  <path d="M710 215 H750" class="line" marker-end="url(#arrow2)"/>
  <path d="M940 215 H980" class="line" marker-end="url(#arrow2)"/>
</svg>
