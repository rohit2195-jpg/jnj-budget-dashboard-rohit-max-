<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Budget Dashboard System Overview</title>
  <desc id="desc">A diagram showing the frontend, approval pause, backend services, generated artifacts, and follow-up session storage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7f8"/>
      <stop offset="100%" stop-color="#f4f6fb"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafbff"/>
    </linearGradient>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .text { font: 400 14px Arial, sans-serif; fill: #4b5563; }
      .small { font: 400 13px Arial, sans-serif; fill: #6b7280; }
      .card { fill: url(#card); stroke: #d1d5db; stroke-width: 1.5; rx: 18; }
      .accent { fill: #d51130; }
      .soft { fill: #ffe4e8; stroke: #fecdd3; stroke-width: 1.5; rx: 16; }
      .line { stroke: #d51130; stroke-width: 3; fill: none; stroke-linecap: round; }
      .muted-line { stroke: #9ca3af; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-dasharray: 8 8; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#d51130"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>
  <text x="60" y="64" class="title">Budget Dashboard System Overview</text>

  <rect x="60" y="110" width="260" height="150" class="card"/>
  <text x="90" y="150" class="label">Frontend</text>
  <text x="90" y="182" class="text">React + Vite dashboard</text>
  <text x="90" y="206" class="text">Dataset picker and uploads</text>
  <text x="90" y="230" class="text">Plan approval and follow-ups</text>

  <rect x="390" y="110" width="260" height="150" class="soft"/>
  <text x="420" y="150" class="label">Approval Boundary</text>
  <text x="420" y="182" class="text">LangGraph handles preprocess,</text>
  <text x="420" y="206" class="text">plan generation, and human pause</text>
  <text x="420" y="230" class="text">with thread-based state</text>

  <rect x="720" y="110" width="360" height="150" class="card"/>
  <text x="750" y="150" class="label">Direct Post-Approval Runner</text>
  <text x="750" y="182" class="text">Backend runs analysis, forecast,</text>
  <text x="750" y="206" class="text">chart generation, and summary</text>
  <text x="750" y="230" class="text">without checkpoint-heavy resume logic</text>

  <rect x="60" y="340" width="300" height="190" class="card"/>
  <text x="90" y="380" class="label">Data Artifacts</text>
  <text x="90" y="412" class="text">Raw datasets in <tspan font-weight="700">data/</tspan></text>
  <text x="90" y="436" class="text">Processed cache in <tspan font-weight="700">pre_processing/processed_data/</tspan></text>
  <text x="90" y="460" class="text">Report output in <tspan font-weight="700">reports/analysis_report.md</tspan></text>
  <text x="90" y="484" class="text">Session state in <tspan font-weight="700">reports/followup_sessions.json</tspan></text>

  <rect x="430" y="340" width="260" height="190" class="card"/>
  <text x="460" y="380" class="label">Reliability Layer</text>
  <text x="460" y="412" class="text">Manifest caching by file hash</text>
  <text x="460" y="436" class="text">Analysis output sanitization</text>
  <text x="460" y="460" class="text">Repair for common pandas issues</text>
  <text x="460" y="484" class="text">Session persistence for follow-ups</text>

  <rect x="760" y="340" width="320" height="190" class="card"/>
  <text x="790" y="380" class="label">Rendered Outputs</text>
  <text x="790" y="412" class="text">Charts and comparisons</text>
  <text x="790" y="436" class="text">Forecast cards and confidence ranges</text>
  <text x="790" y="460" class="text">Markdown summary report</text>
  <text x="790" y="484" class="text">Session-aware follow-up analysis</text>

  <path d="M320 185 H390" class="line" marker-end="url(#arrow)"/>
  <path d="M650 185 H720" class="line" marker-end="url(#arrow)"/>
  <path d="M210 260 V340" class="muted-line" marker-end="url(#arrow-muted)"/>
  <path d="M540 260 V340" class="muted-line" marker-end="url(#arrow-muted)"/>
  <path d="M900 260 V340" class="muted-line" marker-end="url(#arrow-muted)"/>

  <text x="60" y="590" class="small">Public entrypoint: README.md | Detailed guides: documentation/</text>
</svg>
